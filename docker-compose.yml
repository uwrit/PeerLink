services:
  db:
    container_name: peerlinkdb
    image: mariadb
    env_file:
      - .env
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=peerlink
      - MARIADB_USER=peerlink
      - MARIADB_PASSWORD=peerlink
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
    restart: unless-stopped
    networks:
      - peerlink
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: peerlinkbackend
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GRAVITY_FORMS_API_CONSUMER_KEY=${GRAVITY_FORMS_API_CONSUMER_KEY}
      - GRAVITY_FORMS_API_CONSUMER_SECRET=${GRAVITY_FORMS_API_CONSUMER_SECRET}
      - OPENALEX_API_KEY=${OPENALEX_API_KEY}
      - STORAGE_BACKEND=${STORAGE_BACKEND}
    ports:
      - "8000:8000"
    volumes:
      - abstract_data:/app/data
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - peerlink

  frontend:
    container_name: peerlinkfrontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "45680:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - peerlink

networks:
  peerlink:

volumes:
  db_data:
  abstract_data:
